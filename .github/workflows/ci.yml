name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  dotnet:
    name: Build and test (.NET)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Build solution
        run: dotnet build MKVOrchestrator.sln --configuration Release
      - name: Run test harness
        run: dotnet run --project tests/MKVOrchestrator.Tests/MKVOrchestrator.Tests.csproj --configuration Release --no-build

  web:
    name: Build web UI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Type-check and build
        run: npm run build
